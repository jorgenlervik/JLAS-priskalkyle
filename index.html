<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jørgen Lervik AS – Priskalkulatorsystem</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f7f7f5;
      --bg3: #f0efe9;
      --text: #1a1a18;
      --text2: #6b6b65;
      --text3: #a0a09a;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --accent: #1e4d2b;
      --accent-bg: #edf5ef;
      --warn: #a15c00;
      --warn-bg: #fbf1de;
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg2);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }
    .topbar-logo { font-size: 15px; font-weight: 600; color: var(--text); }
    .topbar-logo span { font-weight: 400; color: var(--text2); }
    .sync-status { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #9aa; }
    .sync-dot.ok { background: var(--accent); }
    .sync-dot.err { background: var(--warn); }
    .refresh-btn {
      font-size: 11px; padding: 4px 9px; border-radius: var(--radius);
      border: 0.5px solid var(--border2); background: none; cursor: pointer; color: var(--text2);
    }
    .refresh-btn:hover { background: var(--bg3); color: var(--text); }
    .topbar-date { margin-left: auto; font-size: 12px; color: var(--text3); }

    .setup-banner {
      background: var(--warn-bg);
      color: var(--warn);
      font-size: 12px;
      padding: 8px 24px;
      line-height: 1.5;
      display: none;
    }
    .setup-banner.show { display: block; }
    .setup-banner code { background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 4px; }

    /* ── FAG-NAV ── */
    .fag-nav {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 0 24px;
      display: flex;
      gap: 2px;
      overflow-x: auto;
    }
    .fag-btn {
      padding: 10px 16px;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      cursor: pointer;
      font-size: 13px;
      color: var(--text2);
      white-space: nowrap;
      transition: color .15s;
    }
    .fag-btn:hover { color: var(--text); }
    .fag-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

    /* ── MAIN LAYOUT ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 320px;
      min-height: calc(100vh - 100px);
      max-width: 1200px;
      margin: 0 auto;
      gap: 0;
    }

    /* ── LEFT PANEL ── */
    .panel-left {
      background: var(--bg);
      border-right: 0.5px solid var(--border);
    }
    .firm-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg2);
    }
    .firm-bar label { font-size: 12px; color: var(--text2); }
    .firm-select {
      font-size: 13px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 5px 10px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }
    .add-firm-btn {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border2);
      background: none;
      cursor: pointer;
      color: var(--text2);
    }
    .add-firm-btn:hover { background: var(--bg3); color: var(--text); }

    .group-header {
      padding: 12px 20px 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .item-row {
      display: grid;
      grid-template-columns: 1fr 90px 70px 34px;
      align-items: center;
      gap: 8px;
      padding: 7px 20px;
      border-bottom: 0.5px solid var(--border);
      transition: background .1s;
    }
    .item-row:hover { background: var(--bg2); }
    .item-name { font-size: 13px; color: var(--text); line-height: 1.3; }
    .item-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .price-col { font-size: 13px; color: var(--text2); text-align: right; }
    .qty-input {
      width: 100%;
      text-align: center;
      font-size: 13px;
      padding: 4px 6px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
    }
    .qty-input:focus { outline: none; border-color: var(--accent); }
    .add-btn {
      width: 30px; height: 30px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border2);
      background: none;
      cursor: pointer;
      color: var(--text2);
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .add-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
    .edit-price-btn {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 4px;
      border: 0.5px solid var(--border);
      background: none;
      cursor: pointer;
      color: var(--text3);
      margin-left: 4px;
    }
    .edit-price-btn:hover { color: var(--text2); }
    .loading-msg, .error-msg {
      padding: 40px 20px; text-align: center; color: var(--text3); font-size: 13px; line-height: 1.7;
    }
    .error-msg { color: var(--warn); }

    /* ── RIGHT PANEL (TILBUD) ── */
    .panel-right {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      position: sticky;
      top: 100px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
    }
    .customer-input {
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 7px 12px;
      font-size: 13px;
      width: 100%;
      background: var(--bg);
      color: var(--text);
    }
    .customer-input:focus { outline: none; border-color: var(--accent); }
    .panel-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .quote-list { display: flex; flex-direction: column; gap: 6px; flex: 1; min-height: 120px; }
    .quote-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg2);
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
    }
    .qi-info { flex: 1; }
    .qi-name { font-size: 12px; color: var(--text); line-height: 1.3; }
    .qi-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .qi-price { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; }
    .qi-del {
      background: none; border: none; cursor: pointer;
      color: var(--text3); font-size: 16px; padding: 0 2px; line-height: 1;
    }
    .qi-del:hover { color: #c0392b; }
    .empty-quote {
      text-align: center; padding: 32px 16px;
      color: var(--text3); font-size: 13px; line-height: 1.6;
    }
    .divider { height: 0.5px; background: var(--border); }
    .total-row {
      display: flex; justify-content: space-between;
      align-items: center; font-size: 13px;
    }
    .total-label { color: var(--text2); }
    .total-val { font-weight: 500; color: var(--text); }
    .total-val.big { font-size: 18px; }
    .vat-note { font-size: 11px; color: var(--text3); }
    .action-row { display: flex; gap: 6px; }
    .action-btn {
      flex: 1; padding: 9px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border2);
      background: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--text2);
      transition: all .15s;
    }
    .action-btn:hover { background: var(--bg2); color: var(--text); }
    .action-btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .action-btn.primary:hover { opacity: .88; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 560px;
      max-width: 95vw;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .modal pre {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 12px;
      white-space: pre-wrap;
      line-height: 1.6;
      color: var(--text);
    }
    .modal-close {
      float: right; background: none; border: none;
      cursor: pointer; font-size: 20px; color: var(--text2);
    }
    .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
    .modal-btn {
      flex: 1; padding: 9px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border2);
      background: none; cursor: pointer;
      font-size: 13px; color: var(--text2);
    }
    .modal-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

    @media (max-width: 760px) {
      .main { grid-template-columns: 1fr; }
      .panel-right { position: static; max-height: none; border-top: 0.5px solid var(--border); }
      .item-row { grid-template-columns: 1fr 70px 60px 32px; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="color:var(--text2)">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <div class="topbar-logo">Jørgen Lervik AS <span>· Priskalkulatorsystem</span></div>
    <div class="sync-status">
      <span class="sync-dot" id="sync-dot"></span>

  <!-- MAIN -->
  <div class="main">

    <!-- VENSTRE: PRISLISTER -->
    <div class="panel-left">

    <div class="panel-right">

  <!-- TILBUD MODAL -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">

      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">×</button>

        <button class="modal-btn" onclick="copyQuote()">📋 Kopier tekst</button>
        <button class="modal-btn primary" onclick="printQuote()">🖨 Skriv ut / PDF</button>
      </div>
    </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════
// OPPSETT — lim inn din OneDrive-DELINGSLENKE for priser_mal.xlsx her
// (Høyreklikk filen i OneDrive → Del → "Alle med lenken kan vise" → Kopier lenke)
// Lenken ser typisk slik ut: https://1drv.ms/x/s!Axxxxxxxxxxxxxxxxxxx
// eller: https://xxxx-my.sharepoint.com/:x:/g/personal/.../xxxxxx
// ══════════════════════════════════════════════════════════
const ONEDRIVE_SHARE_URL = "https://jorgenlervikas-my.sharepoint.com/:x:/g/personal/jorgen_jlas_no/IQABNBfZBSBuTL1LAi9Jy8Q_AXussTU6D6e0yTD2f4CgTkw?e=MqXIGd";

// Bygger en direkte nedlastingslenke fra en OneDrive/SharePoint-delingslenke
// ved å legge til "download=1" i lenken (Microsofts anbefalte metode for
// direkte nedlasting av delte filer, uten pålogging)
function toOneDriveDirectUrl(shareUrl) {
  const url = new URL(shareUrl);
  url.searchParams.set("download", "1");
  return url.toString();
}

// Reserveliste (brukes bare hvis Excel-filen ikke kan hentes, f.eks. før du har satt opp lenken over)
// Format: [{ name: fanenavn, rows: [[Gruppe,Navn,Enhet,Pris,Firmaer], ...] }]
const FALLBACK_SHEETS = [
  { name: "Elektriker", rows: [
    ["Gruppe","Navn","Enhet","Pris","Firmaer"],
    ["Stikkontakter","Dobbelt stikk skjult anlegg","stk","800","SG Install;Annet elektro-firma"],
    ["Brytere & Dimmere","Bryter","stk","700","SG Install;Annet elektro-firma"],
  ]},
  { name: "Rørlegger", rows: [
    ["Gruppe","Navn","Enhet","Pris","Firmaer"],
    ["Enkeltposter","Servant med blandebatteri","stk","4500","Rørlegger AS;Annet rørleggerfirma"],
  ]},
  { name: "Maler", rows: [
    ["Gruppe","Navn","Enhet","Pris","Firmaer"],
    ["Vegger & Tak","Ferdig sparkla og malt gipsvegg","m²","350","Malerfirma AS;Annet malerfirma"],
  ]},
];

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let DB = { fag: [] };
let aktivFag = null;
let quote = [];

function fmt(n) {
  return "kr " + Math.round(n).toLocaleString("nb-NO");
}

function slugify(s) {
  return s.toLowerCase()
    .replace(/æ/g,"ae").replace(/ø/g,"o").replace(/å/g,"a")
    .replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
}

function getQtyId(fagId, grpNavn, idx) {
  return `qty_${fagId}_${grpNavn.replace(/\s/g,"_")}_${idx}`;
}

// ── LES ALLE FANER FRA EN INNLASTET XLSX (ArrayBuffer) VIA SHEETJS ──
// Hver fane = ett fag. Rad 1 = tittel (fag + primærfirma), rad 2 = firmaliste,
// rad 4 = kolonneoverskrifter (Gruppe, Navn, Enhet, Pris, Firmaer), rad 5+ = data.
function sheetsFromWorkbook(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: "array" });
  return wb.SheetNames.map(name => {
    const sheet = wb.Sheets[name];
    const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: "" });
    const rows = raw.map(r => r.map(c => (c === null || c === undefined) ? "" : String(c)));
    return { name, rows };
  });
}

// ── BYGG DB FRA FANER (én fane = ett fag) ──
function findHeaderRowIndex(rows) {
  for (let i = 0; i < rows.length; i++) {
    const norm = rows[i].map(c => c.trim().toLowerCase());
    if (norm.includes("gruppe") && norm.includes("navn") && norm.includes("pris")) return i;
  }
  return -1;
}

function buildDBFromSheets(sheets) {
  const fagList = [];
  sheets.forEach(({ name, rows }) => {
    if (!rows.length) return;
    const hIdx = findHeaderRowIndex(rows);
    if (hIdx === -1) return; // fane uten gyldig tabell, hopp over
    const header = rows[hIdx].map(h => h.trim().toLowerCase());
    const iGruppe = header.indexOf("gruppe"), iNavn = header.indexOf("navn"),
          iEnhet = header.indexOf("enhet"), iPris = header.indexOf("pris"),
          iFirmaer = header.indexOf("firmaer");

    const grupperMap = new Map();
    const firmaSet = [];
    for (let r = hIdx + 1; r < rows.length; r++) {
      const row = rows[r];
      const navn = (row[iNavn] || "").trim();
      if (!navn) continue;
      const gruppeNavn = (row[iGruppe] || "Diverse").trim();
      const enhet = (iEnhet >= 0 ? row[iEnhet] : "stk").trim() || "stk";
      const pris = parseFloat(((iPris >= 0 ? row[iPris] : "0") || "0").replace(",", "."));
      const firmaer = iFirmaer >= 0 ? (row[iFirmaer] || "").split(";").map(s => s.trim()).filter(Boolean) : [];
      firmaer.forEach(f => { if (!firmaSet.includes(f)) firmaSet.push(f); });
      if (!grupperMap.has(gruppeNavn)) grupperMap.set(gruppeNavn, []);
      grupperMap.get(gruppeNavn).push({ navn, enhet, pris: isNaN(pris) ? 0 : pris });
    }
    if (grupperMap.size === 0) return;
    const grupper = [];
    grupperMap.forEach((items, navn) => grupper.push({ navn, items }));
    fagList.push({ id: slugify(name), navn: name, firmaer: firmaSet, grupper });
  });
  return { fag: fagList };
}

// ── LAST PRISER FRA ONEDRIVE-EXCEL (flere faner) ──
async function loadDB() {
  setSyncStatus("loading", "Henter priser...");
  const usingPlaceholder = !ONEDRIVE_SHARE_URL || ONEDRIVE_SHARE_URL.startsWith("SETT_INN");

  if (usingPlaceholder) {
    DB = buildDBFromSheets(FALLBACK_SHEETS);
    setSyncStatus("err", "Ikke koblet til Excel-fil – viser reserveliste");
    showSetupBanner(true);
    finishLoad();
    return;
  }

  try {
    const directUrl = toOneDriveDirectUrl(ONEDRIVE_SHARE_URL);
    const res = await fetch(directUrl, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const buf = await res.arrayBuffer();
    const sheets = sheetsFromWorkbook(buf);
    DB = buildDBFromSheets(sheets);
    if (DB.fag.length === 0) throw new Error("Fant ingen gyldige faner");
    const now = new Date().toLocaleTimeString("nb-NO", { hour: "2-digit", minute: "2-digit" });
    setSyncStatus("ok", "Priser oppdatert kl. " + now);
    showSetupBanner(false);
  } catch (err) {
    console.warn("Kunne ikke hente Excel-filen, bruker reserveliste:", err);
    DB = buildDBFromSheets(FALLBACK_SHEETS);
    setSyncStatus("err", "Fikk ikke kontakt med Excel-filen – viser reserveliste");
    showSetupBanner(true);
  }
  finishLoad();
}

function finishLoad() {
  if (!aktivFag || !DB.fag.find(f => f.id === aktivFag)) {
    aktivFag = DB.fag[0]?.id || null;
  }
  renderNav();
  renderFirmSelect();
  renderItems();
}

function setSyncStatus(state, text) {
  const dot = document.getElementById("sync-dot");
  dot.className = "sync-dot" + (state === "ok" ? " ok" : state === "err" ? " err" : "");
  document.getElementById("sync-text").textContent = text;
}

function showSetupBanner(show) {
  const el = document.getElementById("setup-banner");
  if (show) {
    el.innerHTML = "⚠️ Siden er ikke koblet til Excel-filen din ennå. Lim inn OneDrive-delingslenken din i " +
      "<code>ONEDRIVE_SHARE_URL</code> øverst i koden for at prisendringer i Excel skal vises her automatisk.";
    el.classList.add("show");
  } else {
    el.classList.remove("show");
  }
}

// ── RENDER NAV ──
function renderNav() {
  document.getElementById("fag-nav").innerHTML = DB.fag.map(f =>
    `<button class="fag-btn${f.id===aktivFag?" active":""}" onclick="setFag('${f.id}')">${f.navn}</button>`
  ).join("");
}

// ── RENDER FIRMA-SELECT ──
function renderFirmSelect() {
  const fag = DB.fag.find(f => f.id === aktivFag);
  const firmaer = fag && fag.firmaer.length ? fag.firmaer : ["Ukjent firma"];
  document.getElementById("firm-select").innerHTML =
    firmaer.map(f => `<option>${f}</option>`).join("");
}

// ── RENDER ITEMS ──
function renderItems() {
  const fag = DB.fag.find(f => f.id === aktivFag);
  if (!fag) {
    document.getElementById("items-list").innerHTML = `<div class="loading-msg">Ingen priser lastet ennå.</div>`;
    return;
  }
  let html = "";
  fag.grupper.forEach(g => {
    html += `<div class="group-header">${g.navn}</div>`;
    g.items.forEach((item, i) => {
      const qid = getQtyId(aktivFag, g.navn, i);
      html += `
        <div class="item-row">
          <div>
            <div class="item-name">${item.navn}</div>
            <div class="item-meta">${item.enhet} &middot; ${fmt(item.pris)}
              <button class="edit-price-btn"
                onclick="editPrice('${aktivFag}','${g.navn.replace(/'/g,"\\'")}',${i})"
                title="Midlertidig endring (kun denne økten)">✏️</button>
            </div>
          </div>
          <div class="price-col" id="subtotal_${qid}">${fmt(item.pris)}</div>
          <input class="qty-input" id="${qid}" type="number" min="0" step="0.5" value="1"
            oninput="updateSubtotal('${qid}',${item.pris})" />
          <button class="add-btn"
            onclick="addToQuote('${aktivFag}','${g.navn.replace(/'/g,"\\'")}',${i})"
            title="Legg til tilbud">+</button>
        </div>`;
    });
  });
  document.getElementById("items-list").innerHTML = html;
}

function updateSubtotal(qid, pris) {
  const qty = parseFloat(document.getElementById(qid).value) || 0;
  document.getElementById("subtotal_" + qid).textContent = fmt(pris * qty);
}

// ── SET FAG ──
function setFag(id) {
  aktivFag = id;
  renderNav();
  renderFirmSelect();
  renderItems();
}

// ── LEGG TIL FIRMA (kun denne økten, lagres ikke i Excel-filen) ──
function addFirm() {
  const name = prompt("Navn på nytt firma (kun for denne økten – legg det inn i Excel-filen for at det skal bli permanent):");
  if (!name) return;
  DB.fag.find(f => f.id === aktivFag).firmaer.push(name);
  renderFirmSelect();
}

// ── ENDRE PRIS (kun denne økten, lagres ikke i Excel-filen) ──
function editPrice(fagId, grpNavn, idx) {
  const fag = DB.fag.find(f => f.id === fagId);
  const grp = fag.grupper.find(g => g.navn === grpNavn);
  const item = grp.items[idx];
  const ny = prompt(`Midlertidig ny pris for (kun denne økten):\n"${item.navn}"\n(eks. mva, uten kr):\n\nFor en permanent endring, oppdater prisen i Excel-filen i stedet.`, item.pris);
  if (ny === null) return;
  const n = parseFloat(ny.replace(",", "."));
  if (!isNaN(n) && n >= 0) {
    item.pris = n;
    renderItems();
  }
}

// ── LEGG TIL I TILBUD ──
function addToQuote(fagId, grpNavn, idx) {
  const fag = DB.fag.find(f => f.id === fagId);
  const grp = fag.grupper.find(g => g.navn === grpNavn);
  const item = grp.items[idx];
  const qid = getQtyId(fagId, grpNavn, idx);
  const qty = parseFloat(document.getElementById(qid)?.value) || 1;
  const firma = document.getElementById("firm-select").value;
  quote.push({
    fagnavn: fag.navn,
    firma,
    navn: item.navn,
    enhet: item.enhet,
    pris: item.pris,
    qty,
    total: item.pris * qty
  });
  renderQuote();
}

// ── FJERN FRA TILBUD ──
function removeItem(i) {
  quote.splice(i, 1);
  renderQuote();
}

// ── TØM TILBUD ──
function clearQuote() {
  if (quote.length && !confirm("Tøm hele tilbudet?")) return;
  quote = [];
  renderQuote();
}

// ── RENDER TILBUD ──
function renderQuote() {
  const el = document.getElementById("quote-list");
  if (quote.length === 0) {
    el.innerHTML = `<div class="empty-quote">📋 Legg til poster fra venstre panel</div>`;
    updateTotals(0);
    return;
  }
  el.innerHTML = quote.map((q, i) => `
    <div class="quote-item">
      <div class="qi-info">
        <div class="qi-name">${q.navn}</div>
        <div class="qi-sub">${q.qty} ${q.enhet} · ${q.firma} · ${q.fagnavn}</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <div class="qi-price">${fmt(q.total)}</div>
        <button class="qi-del" onclick="removeItem(${i})" title="Fjern">×</button>
      </div>
    </div>`).join("");
  updateTotals(quote.reduce((a, q) => a + q.total, 0));
}

function updateTotals(sum) {
  document.getElementById("total-eks").textContent = fmt(sum);
  document.getElementById("total-mva").textContent = fmt(sum * 0.25);
  document.getElementById("total-inkl").textContent = fmt(sum * 1.25);
}

// ── TILBUDS-MODAL ──
function showQuoteModal() {
  if (quote.length === 0) { alert("Tilbudet er tomt."); return; }
  const kunde = document.getElementById("customer-input").value || "Kunde";
  const dato = new Date().toLocaleDateString("nb-NO");
  const sum = quote.reduce((a, q) => a + q.total, 0);

  const gruppert = {};
  quote.forEach(q => {
    if (!gruppert[q.fagnavn]) gruppert[q.fagnavn] = [];
    gruppert[q.fagnavn].push(q);
  });

  let txt = `TILBUD\n`;
  txt += `${"─".repeat(46)}\n`;
  txt += `Til:    ${kunde}\n`;
  txt += `Fra:    Jørgen Lervik AS\n`;
  txt += `Dato:   ${dato}\n`;
  txt += `${"─".repeat(46)}\n\n`;

  Object.entries(gruppert).forEach(([fag, items]) => {
    txt += `${fag.toUpperCase()}\n`;
    items.forEach(q => {
      const linje = `  ${q.navn}`;
      const prisStr = fmt(q.total).padStart(12);
      txt += `${linje.padEnd(34)} ${prisStr}\n`;
      txt += `    ${q.qty} ${q.enhet} à ${fmt(q.pris)}\n`;
    });
    txt += "\n";
  });

  txt += `${"─".repeat(46)}\n`;
  txt += `Sum eks. mva:`.padEnd(34) + fmt(sum).padStart(12) + "\n";
  txt += `Mva 25%:`.padEnd(34) + fmt(sum * 0.25).padStart(12) + "\n";
  txt += `TOTAL inkl. mva:`.padEnd(34) + fmt(sum * 1.25).padStart(12) + "\n";
  txt += `${"─".repeat(46)}\n`;
  txt += `\nJørgen Lervik AS\n`;

  document.getElementById("modal-kunde").textContent = kunde;
  document.getElementById("modal-content").textContent = txt;
  document.getElementById("modal").classList.add("open");
}

function closeModal(e) {
  if (e.target.id === "modal") document.getElementById("modal").classList.remove("open");
}

function copyQuote() {
  const txt = document.getElementById("modal-content").textContent;
  navigator.clipboard.writeText(txt).then(() => alert("Tilbud kopiert til utklippstavlen!"));
}

function printQuote() {
  window.print();
}

// ── INIT ──
document.getElementById("date-display").textContent =
  new Date().toLocaleDateString("nb-NO", { day:"2-digit", month:"long", year:"numeric" });
renderQuote();
loadDB();
</script>
